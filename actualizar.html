<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Actualizando portal</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#f5f8fc;color:#10233f;font-family:"Century Gothic",Arial,sans-serif}.card{width:min(92vw,420px);padding:28px;border:1px solid #dce5ef;border-radius:18px;background:#fff;box-shadow:0 18px 50px rgba(16,35,63,.12);text-align:center}.mark{width:42px;height:42px;margin:0 auto 16px;border:3px solid #dbe5f0;border-top-color:#1557a8;border-radius:50%;animation:spin .8s linear infinite}h1{font-size:18px;margin:0 0 8px}p{font-size:13px;line-height:1.55;margin:0;color:#607086}@keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card"><div class="mark" aria-hidden="true"></div><h1>Actualizando almacenamiento</h1><p>Se está aplicando la corrección de guardado en Firestore sin alterar el inicio de sesión.</p></main>
  <script>
    (async()=>{
      try{
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg=>reg.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.map(key=>caches.delete(key)));
        }
      }catch(error){console.warn('[Portal] Limpieza parcial de caché.',error)}
      try{
        localStorage.removeItem('sp_legacy_coop_sw_removed_v11404');
        sessionStorage.clear();
      }catch(_error){}
      const target=new URL('index.html',location.href);
      target.searchParams.set('portal-build','11.49.0-script-no-lines');
      target.searchParams.set('_',Date.now().toString());
      location.replace(target.href);
    })();
  </script>
</body>
</html>
