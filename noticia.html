  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    window.__PORTAL_EXPECTED_BUILD__ = "11.46.0-ux-polish";
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => {
            const urls = [reg.active?.scriptURL, reg.waiting?.scriptURL, reg.installing?.scriptURL].filter(Boolean);
            return urls.some(url => url.includes("coop-sw.js")) ? reg.unregister() : Promise.resolve(false);
          }));
        }
        if ("caches" in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
        }
      } catch (error) {
        console.info("[Portal] Limpieza preventiva completada con observaciones.", error);
      }
    })();
  </script>
